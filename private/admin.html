<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ovrload | Admin Panel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Dashboard Layout -->
  <div id="dashboard-layout" class="wrapper">
    <!-- Navigation -->
    <nav class="admin-nav">
      <div class="admin-nav-brand">
        <span class="admin-nav-logo-ovr">OVR</span>
        <span class="admin-nav-logo-load">LOAD</span>
        <span style="font-size: 0.8rem; color: var(--text-tertiary); margin-left: 0.5rem; font-weight: 600;">ADMIN</span>
      </div>
      <div class="admin-nav-actions">
        <a href="/" class="admin-nav-btn admin-nav-btn-secondary">View Public Menu</a>
        <button id="logout-btn" class="admin-nav-btn admin-nav-btn-danger">Log Out</button>
      </div>
    </nav>

    <!-- Main Inventory Section -->
    <div class="admin-container">
      <div class="admin-header">
        <h1 class="admin-title">Product Inventory</h1>
        <div style="display: flex; gap: 0.5rem;">
          <button class="add-btn" id="open-categories-btn" style="background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--surface-border); font-weight: 600;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
              <line x1="4" y1="9" x2="20" y2="9"></line>
              <line x1="4" y1="15" x2="20" y2="15"></line>
              <line x1="10" y1="3" x2="10" y2="21"></line>
            </svg>
            Sort Categories
          </button>
          <button class="add-btn" id="open-add-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Add Product
          </button>
        </div>
      </div>

      <!-- Inventory Table -->
      <div class="table-card glass">
        <div class="table-wrapper">
          <table class="admin-table">
            <thead>
              <tr>
                <th class="admin-th" style="width: 60px;">Image</th>
                <th class="admin-th">Item Name</th>
                <th class="admin-th">Category</th>
                <th class="admin-th">Description</th>
                <th class="admin-th">Unit Price (USD)</th>
                <th class="admin-th" style="width: 100px;">Sort Order</th>
                <th class="admin-th" style="text-align: right;">Actions</th>
              </tr>
            </thead>
            <tbody id="inventory-tbody">
              <!-- Products will be dynamically populated here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Product Modal Overlay -->
  <div class="admin-modal-overlay" id="product-modal" style="display: none;">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h2 class="admin-modal-title" id="modal-title">Add New Product</h2>
        <button class="admin-modal-close" id="close-modal-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      
      <form id="product-form" class="auth-form">
        <div class="form-group">
          <label class="form-label">Item Name *</label>
          <input type="text" id="prod-name" placeholder="e.g. Graphic Tee Black" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">Category *</label>
          <input type="text" id="prod-category" placeholder="e.g. Tees, Hoodies, Accessories" class="form-input" list="categories-list" required>
          <datalist id="categories-list">
            <option value="Tees"></option>
            <option value="Hoodies"></option>
            <option value="Accessories"></option>
            <option value="Outerwear"></option>
          </datalist>
        </div>

        <div class="form-group">
          <label class="form-label">Unit Price (USD) *</label>
          <input type="number" id="prod-price" placeholder="0.00" step="0.01" min="0" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">Image URL</label>
          <input type="url" id="prod-image" placeholder="e.g. https://images.unsplash.com/..." class="form-input">
        </div>

        <div class="form-group">
          <label class="form-label">Sort Order *</label>
          <input type="number" id="prod-sort" placeholder="e.g. 1" min="0" value="0" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="prod-desc" placeholder="Enter details, materials, sizing info..." class="form-textarea"></textarea>
        </div>

        <p id="form-error" class="error-message" style="display: none;"></p>

        <div class="admin-modal-actions">
          <button type="button" class="admin-modal-btn admin-modal-btn-cancel" id="cancel-modal-btn">Cancel</button>
          <button type="submit" class="admin-modal-btn admin-modal-btn-save" id="save-product-btn">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Sort Categories Modal Overlay -->
  <div class="admin-modal-overlay" id="categories-modal" style="display: none;">
    <div class="admin-modal" style="max-width: 420px;">
      <div class="admin-modal-header">
        <h2 class="admin-modal-title">Sort Categories</h2>
        <button class="admin-modal-close" id="close-categories-modal-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      
      <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;">
        Lower sort numbers will place the category tab further to the left.
      </p>

      <div style="max-height: 300px; overflow-y: auto; padding-right: 0.5rem;" id="categories-sort-list">
        <!-- Categories list loads here dynamically -->
      </div>

      <div class="admin-modal-actions" style="margin-top: 1.5rem; justify-content: flex-end;">
        <button type="button" class="admin-modal-btn admin-modal-btn-cancel" id="close-categories-done-btn">Done</button>
      </div>
    </div>
  </div>

  <script src="/js/admin.js?v=2"></script>
</body>
</html>
