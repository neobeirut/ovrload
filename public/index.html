<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>ovrload | Official Menu</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
  <!-- Brand Cover Image -->
  <div class="cover-container">
    <img src="https://app.neobeirut.com/ovrload/images/main.jpg" alt="OVR LOAD Cover" class="cover-img">
  </div>

  <!-- Content Container -->
  <div class="container">
    
    <!-- Sticky Search & Filters -->
    <section class="controls">
      <div class="search-box">
        <span class="search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
        <input type="text" id="search-input" placeholder="Search OVRLOAD..." class="search-input">
      </div>

      <div class="category-scroller" id="category-scroller">
        <!-- Categories will be loaded dynamically here -->
      </div>
    </section>

    <!-- Product Grid/List -->
    <section class="product-list" id="product-list">
      <!-- Loading Skeleton Skeletons -->
      <div class="product-card glass" style="opacity: 0.5; pointer-events: none;">
        <div class="card-header">
          <div style="width: 60%; height: 1.25rem; background: rgba(255,255,255,0.1); border-radius: 4px;"></div>
          <div style="width: 20%; height: 1.25rem; background: rgba(255,255,255,0.1); border-radius: 4px;"></div>
        </div>
        <div style="width: 30%; height: 0.9rem; background: rgba(255,255,255,0.05); border-radius: 4px;"></div>
        <div style="width: 100%; height: 2.5rem; background: rgba(255,255,255,0.05); border-radius: 4px; margin-top: 0.5rem;"></div>
      </div>
      <div class="product-card glass" style="opacity: 0.5; pointer-events: none;">
        <div class="card-header">
          <div style="width: 50%; height: 1.25rem; background: rgba(255,255,255,0.1); border-radius: 4px;"></div>
          <div style="width: 25%; height: 1.25rem; background: rgba(255,255,255,0.1); border-radius: 4px;"></div>
        </div>
        <div style="width: 25%; height: 0.9rem; background: rgba(255,255,255,0.05); border-radius: 4px;"></div>
        <div style="width: 100%; height: 2.5rem; background: rgba(255,255,255,0.05); border-radius: 4px; margin-top: 0.5rem;"></div>
      </div>
    </section>

  </div>

  <!-- Detail Drawer -->
  <div class="modal-overlay" id="detail-overlay" style="display: none;">
    <div class="drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-header">
        <h2 class="drawer-title" id="drawer-title">Product Name</h2>
        <span class="drawer-price" id="drawer-price">$0.00</span>
      </div>
      <span class="drawer-category" id="drawer-category">Category</span>
      
      <img id="drawer-image" class="drawer-img" src="" alt="" style="display: none;">
      
      <h3 class="drawer-desc-title">Description</h3>
      <p class="drawer-desc" id="drawer-desc">Description details...</p>
      
      <button class="close-btn" id="close-drawer-btn">Close Details</button>
    </div>
  </div>

  <!-- Brand Footer -->
  <footer class="footer">
    <span>&copy; <span id="year">2026</span> ovrload. All rights reserved.</span>
  </footer>

  <script src="js/app.js?v=2"></script>
</body>
</html>
